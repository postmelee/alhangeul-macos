name: 문서 호환성 문제
description: 특정 HWP/HWPX 문서가 열리지 않거나 표시, 저장, 내보내기 결과가 이상한 문제를 제보합니다.
title: "[Compat] "
labels: ["bug", "area:rendering", "area:test-assets"]
body:
  - type: markdown
    attributes:
      value: |
        문서 파일에는 개인정보나 업무상 민감한 내용이 들어 있을 수 있습니다. public issue에 첨부하기 전에 반드시 민감한 내용을 제거하고, 첨부가 어렵다면 증상 설명과 캡처만 남겨 주세요.
  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: 어떤 문서에서 어떤 호환성 문제가 보이는지 짧게 적어 주세요.
      placeholder: "예: 특정 HWPX 문서에서 표 배경색이 사라지고 PDF 내보내기 결과도 깨집니다."
    validations:
      required: true
  - type: dropdown
    id: document-format
    attributes:
      label: 문서 형식
      options:
        - HWP
        - HWPX
        - HWP3 또는 오래된 HWP
        - 알 수 없음
    validations:
      required: true
  - type: dropdown
    id: affected-surface
    attributes:
      label: 문제가 보이는 위치
      multiple: true
      options:
        - 앱 화면
        - Quick Look preview
        - Finder thumbnail
        - PDF 내보내기
        - 인쇄
        - 공유
        - 저장 또는 다른 이름으로 저장
        - 알 수 없음
    validations:
      required: true
  - type: textarea
    id: expected-result
    attributes:
      label: 기대 결과
      description: 원래 어떤 모양이나 동작이어야 하는지 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: actual-result
    attributes:
      label: 실제 결과
      description: 알한글에서 실제로 보이는 결과를 적어 주세요.
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: 알한글 앱 버전
      placeholder: "예: 0.1.3 (9)"
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS 버전
      placeholder: "예: macOS 15.5"
    validations:
      required: true
  - type: dropdown
    id: sample-availability
    attributes:
      label: sample 문서 제공 가능 여부
      options:
        - 개인정보를 제거한 sample 문서를 첨부할 수 있습니다.
        - 문서 첨부는 어렵지만 스크린샷은 첨부할 수 있습니다.
        - 문서와 스크린샷 모두 첨부하기 어렵습니다.
    validations:
      required: true
  - type: upload
    id: sample-file
    attributes:
      label: sample 문서 또는 캡처
      description: 개인정보를 제거한 파일, 문제 위치 캡처, 비교 이미지가 있으면 첨부해 주세요.
    validations:
      required: false
  - type: textarea
    id: extra-context
    attributes:
      label: 추가 맥락
      description: 문서 생성 프로그램, 원본 환경, 다른 앱에서의 표시 결과, 관련 issue/PR 링크를 적어 주세요.
    validations:
      required: false
