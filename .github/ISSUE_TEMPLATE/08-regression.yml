name: 회귀 제보
description: 이전 버전이나 이전 커밋에서 되던 기능이 새 버전에서 깨진 문제를 제보합니다.
title: "[Regression] "
labels: ["bug", "kind:regression"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 회귀 요약
      description: 이전에는 되던 것이 지금 어떻게 깨졌는지 적어 주세요.
    validations:
      required: true
  - type: input
    id: worked-before
    attributes:
      label: 정상 동작하던 마지막 버전
      description: 알 수 있으면 버전, build, commit, release tag를 적어 주세요.
      placeholder: "예: 0.1.2 또는 commit abc123"
    validations:
      required: true
  - type: input
    id: broken-now
    attributes:
      label: 문제가 발생한 버전
      description: 문제가 처음 보인 버전, build, commit, release tag를 적어 주세요.
      placeholder: "예: 0.1.3 또는 commit def456"
    validations:
      required: true
  - type: dropdown
    id: affected-surface
    attributes:
      label: 영향을 받는 위치
      multiple: true
      options:
        - 앱 화면
        - Quick Look preview
        - Finder thumbnail
        - PDF 내보내기
        - 인쇄
        - 저장 또는 다른 이름으로 저장
        - 설치 또는 업데이트
        - CI 또는 개발 workflow
        - 알 수 없음
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 비교 가능한 재현 절차
      description: 정상 버전과 문제 버전에서 같은 방식으로 비교할 수 있는 절차를 적어 주세요.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected-result
    attributes:
      label: 이전 정상 동작
      description: 정상 버전에서 어떤 결과가 나왔는지 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: actual-result
    attributes:
      label: 현재 깨진 동작
      description: 문제 버전에서 실제로 어떤 결과가 나오는지 적어 주세요.
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS 버전
      placeholder: "예: macOS 15.5"
    validations:
      required: true
  - type: upload
    id: attachments
    attributes:
      label: 첨부 자료
      description: 이전/현재 비교 캡처, sample 문서, 로그가 있으면 첨부해 주세요.
    validations:
      required: false
