name: Quick Look 또는 썸네일 문제
description: Finder 미리보기, spacebar Quick Look, Finder thumbnail, extension 등록 문제를 제보합니다.
title: "[Finder] "
labels: ["bug", "area:quick-look", "area:thumbnail"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: Finder에서 어떤 문제가 보이는지 적어 주세요.
      placeholder: "예: Space로 미리보기를 열면 빈 화면이고, Finder icon thumbnail도 생성되지 않습니다."
    validations:
      required: true
  - type: dropdown
    id: affected-feature
    attributes:
      label: 영향을 받는 기능
      multiple: true
      options:
        - Quick Look preview
        - Finder thumbnail
        - 앱 정보 창의 extension 상태 진단
        - 둘 다 또는 구분하기 어려움
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Finder에서 재현하는 절차
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS 버전
      placeholder: "예: macOS 15.5"
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: 알한글 앱 버전
      placeholder: "예: 0.1.3 (9)"
    validations:
      required: true
  - type: dropdown
    id: install-source
    attributes:
      label: 설치 경로
      options:
        - GitHub Release DMG
        - Homebrew Cask
        - 소스 빌드
        - 알 수 없음
    validations:
      required: true
  - type: dropdown
    id: file-type
    attributes:
      label: 파일 형식
      options:
        - HWP
        - HWPX
        - HWP3 또는 오래된 HWP
        - 알 수 없음
    validations:
      required: true
  - type: textarea
    id: extension-diagnostics
    attributes:
      label: extension 상태 또는 진단 정보
      description: 앱 정보 창의 Quick Look/Thumbnail extension 상태, `qlmanage` 결과, 콘솔 로그가 있으면 붙여 주세요.
      render: shell
    validations:
      required: false
  - type: upload
    id: attachments
    attributes:
      label: 첨부 자료
      description: Finder 캡처, Quick Look 화면, 개인정보를 제거한 sample 파일을 첨부해 주세요.
    validations:
      required: false
