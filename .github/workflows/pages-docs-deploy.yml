name: Docs-only Pages Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"

permissions:
  contents: read

# Keep the full docs-only fetch -> artifact -> deploy sequence serialized.
# The prepared artifact contains the current public appcast, so locking only
# deploy-pages could let an older fetched appcast deploy after a release deploy.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  prepare-pages-artifact:
    name: Prepare docs-only Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deploy: ${{ steps.release_asset_gate.outputs.deploy }}

    steps:
      - name: Validate deployment ref
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "ERROR: docs-only Pages deployment must run from refs/heads/main; got $GITHUB_REF" >&2
            exit 1
          fi

          {
            echo "## Deployment ref"
            echo
            echo "- ref: \`$GITHUB_REF\`"
            echo "- policy: docs-only Pages deployment is restricted to \`main\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check release asset availability
        id: release_asset_gate
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_link_matches="$(
            grep -RhoE 'releases/(latest/download|download/v[0-9]+\.[0-9]+\.[0-9]+)/alhangeul-macos-[0-9]+\.[0-9]+\.[0-9]+\.dmg' docs || true
          )"

          if [ -z "$release_link_matches" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Release asset gate"
              echo
              echo "- deploy: allowed"
              echo "- reason: no release DMG links found in docs"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          mapfile -t release_versions < <(
            printf "%s\n" "$release_link_matches" \
              | sed -E 's#.*alhangeul-macos-([0-9]+\.[0-9]+\.[0-9]+)\.dmg#\1#' \
              | sort -u
          )

          missing_versions=()
          for version in "${release_versions[@]}"; do
            response_file="$(mktemp)"
            release_api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/v${version}"
            http_status="$(
              curl -sS --retry 3 --retry-delay 5 --retry-all-errors \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -o "$response_file" \
                -w "%{http_code}" \
                "$release_api_url"
            )" || {
              curl_exit="$?"
              echo "ERROR: failed to query release v${version} through GitHub API; curl exit ${curl_exit}" >&2
              rm -f "$response_file"
              exit 1
            }

            if [ "$http_status" = "404" ]; then
              missing_versions+=("$version")
              rm -f "$response_file"
              continue
            fi

            if [ "$http_status" != "200" ]; then
              echo "ERROR: GitHub API returned HTTP ${http_status} for release v${version}" >&2
              cat "$response_file" >&2
              rm -f "$response_file"
              exit 1
            fi

            if ! jq -e --arg asset "alhangeul-macos-${version}.dmg" '.assets[]? | select(.name == $asset)' "$response_file" >/dev/null; then
              missing_versions+=("$version")
            fi

            rm -f "$response_file"
          done

          if [ "${#missing_versions[@]}" -gt 0 ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Release asset gate"
              echo
              echo "- deploy: skipped"
              echo "- missing release versions: \`${missing_versions[*]}\`"
              echo "- reason: docs-only Pages deploy waits until linked public DMG assets exist"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "deploy=true" >> "$GITHUB_OUTPUT"
          {
            echo "## Release asset gate"
            echo
            echo "- deploy: allowed"
            echo "- checked release versions: \`${release_versions[*]}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fetch current public appcast
        id: appcast
        if: steps.release_asset_gate.outputs.deploy == 'true'
        shell: bash
        env:
          PUBLIC_APPCAST_URL: https://postmelee.github.io/alhangeul-macos/appcast.xml
          PUBLIC_APPCAST_PATH: ${{ github.workspace }}/build.noindex/release/public-appcast.xml
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$PUBLIC_APPCAST_PATH")"

          curl -fsSL --retry 3 --retry-delay 5 \
            "$PUBLIC_APPCAST_URL" \
            -o "$PUBLIC_APPCAST_PATH"

          test -s "$PUBLIC_APPCAST_PATH"
          xmllint --noout "$PUBLIC_APPCAST_PATH"

          echo "public_appcast_path=$PUBLIC_APPCAST_PATH" >> "$GITHUB_OUTPUT"

          {
            echo "## Public appcast"
            echo
            echo "- source: $PUBLIC_APPCAST_URL"
            echo "- local path: \`$PUBLIC_APPCAST_PATH\`"
            echo "- validation: \`xmllint --noout\` passed"
            echo "- fallback: disabled; stale repository \`docs/appcast.xml\` is not used"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare Pages artifact
        id: pages_artifact
        if: steps.release_asset_gate.outputs.deploy == 'true'
        shell: bash
        run: |
          set -euo pipefail
          pages_artifact_dir="$GITHUB_WORKSPACE/build.noindex/release/pages-artifact"

          scripts/ci/prepare-pages-artifact.sh \
            --docs-dir docs \
            --appcast "${{ steps.appcast.outputs.public_appcast_path }}" \
            --output-dir "$pages_artifact_dir"

          test -f "$pages_artifact_dir/index.html"
          test -f "$pages_artifact_dir/updates/index.html"
          test -s "$pages_artifact_dir/appcast.xml"
          xmllint --noout "$pages_artifact_dir/appcast.xml"

          echo "pages_artifact_dir=$pages_artifact_dir" >> "$GITHUB_OUTPUT"

          {
            echo
            echo "## Pages artifact"
            echo
            echo "- artifact source: \`docs/\` + preserved public \`appcast.xml\`"
            echo "- artifact directory: \`$pages_artifact_dir\`"
            echo "- required files: \`index.html\`, \`updates/index.html\`, \`appcast.xml\`"
            echo "- publish model: \`actions/deploy-pages\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pages artifact
        if: steps.release_asset_gate.outputs.deploy == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ steps.pages_artifact.outputs.pages_artifact_dir }}
          retention-days: 14

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: prepare-pages-artifact
    if: needs.prepare-pages-artifact.outputs.deploy == 'true'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Record Pages deployment summary
        shell: bash
        run: |
          {
            echo "## GitHub Pages deployment"
            echo
            echo "- URL: ${{ steps.deployment.outputs.page_url }}"
            echo "- appcast: https://postmelee.github.io/alhangeul-macos/appcast.xml"
            echo "- source: docs-only workflow with preserved public appcast"
          } >> "$GITHUB_STEP_SUMMARY"
