name: AlhangeulMac
options:
  bundleIdPrefix: com.postmelee
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
targets:
  HostApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/HostApp
      - path: Sources/Shared
      - path: Sources/RhwpCoreBridge
    dependencies:
      - target: QLExtension
        embed: true
      - target: ThumbnailExtension
        embed: true
      - framework: Frameworks/Rhwp.xcframework
        embed: false
    settings:
      base:
        PRODUCT_NAME: AlhangeulMac
        EXECUTABLE_NAME: AlhangeulMacHost
        PRODUCT_BUNDLE_IDENTIFIER: com.postmelee.alhangeulmac
        INFOPLIST_FILE: Sources/HostApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/HostApp/HostApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic

  QLExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/QLExtension
      - path: Sources/Shared
      - path: Sources/RhwpCoreBridge
    dependencies:
      - framework: Frameworks/Rhwp.xcframework
        embed: false
    settings:
      base:
        PRODUCT_NAME: AlhangeulMacPreview
        EXECUTABLE_NAME: AlhangeulMacPreview
        PRODUCT_BUNDLE_IDENTIFIER: com.postmelee.alhangeulmac.QLExtension
        INFOPLIST_FILE: Sources/QLExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/QLExtension/QLExtension.entitlements
        CODE_SIGN_STYLE: Automatic

  ThumbnailExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/ThumbnailExtension
      - path: Sources/Shared
      - path: Sources/RhwpCoreBridge
    dependencies:
      - framework: Frameworks/Rhwp.xcframework
        embed: false
    settings:
      base:
        PRODUCT_NAME: AlhangeulMacThumbnail
        EXECUTABLE_NAME: AlhangeulMacThumbnail
        PRODUCT_BUNDLE_IDENTIFIER: com.postmelee.alhangeulmac.ThumbnailExtension
        INFOPLIST_FILE: Sources/ThumbnailExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ThumbnailExtension/ThumbnailExtension.entitlements
        CODE_SIGN_STYLE: Automatic
