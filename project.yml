name: Alhangeul
options:
  bundleIdPrefix: com.postmelee
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.1
targets:
  HostApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/HostApp
        excludes:
          - Resources/rhwp-studio
          - Resources/Legal
      - path: Sources/HostApp/Resources/Legal
        type: folder
      - path: Sources/HostApp/Resources/rhwp-studio
        type: folder
      - path: Sources/Shared
      - path: Sources/RhwpCoreBridge
    dependencies:
      - target: QLExtension
        embed: true
      - target: ThumbnailExtension
        embed: true
      - framework: Frameworks/Rhwp.xcframework
        embed: false
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_NAME: Alhangeul
        EXECUTABLE_NAME: Alhangeul
        PRODUCT_BUNDLE_IDENTIFIER: com.postmelee.alhangeul
        INFOPLIST_FILE: Sources/HostApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/HostApp/HostApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic

  QLExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/QLExtension
      - path: Sources/Shared
      - path: Sources/RhwpCoreBridge
    dependencies:
      - framework: Frameworks/Rhwp.xcframework
        embed: false
    settings:
      base:
        PRODUCT_NAME: AlhangeulPreview
        EXECUTABLE_NAME: AlhangeulPreview
        PRODUCT_BUNDLE_IDENTIFIER: com.postmelee.alhangeul.QLExtension
        INFOPLIST_FILE: Sources/QLExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/QLExtension/QLExtension.entitlements
        CODE_SIGN_STYLE: Automatic

  ThumbnailExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/ThumbnailExtension
      - path: Sources/Shared
      - path: Sources/RhwpCoreBridge
    dependencies:
      - framework: Frameworks/Rhwp.xcframework
        embed: false
    settings:
      base:
        PRODUCT_NAME: AlhangeulThumbnail
        EXECUTABLE_NAME: AlhangeulThumbnail
        PRODUCT_BUNDLE_IDENTIFIER: com.postmelee.alhangeul.ThumbnailExtension
        INFOPLIST_FILE: Sources/ThumbnailExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ThumbnailExtension/ThumbnailExtension.entitlements
        CODE_SIGN_STYLE: Automatic
